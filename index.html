<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퍼포먼스 마케터 포트폴리오</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans">

    <section class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 text-white relative overflow-hidden px-6 py-24">
        
        <div class="absolute inset-0 opacity-10 bg-[linear-gradient(to_right,#8080800a_1px,transparent_1px),linear-gradient(to_bottom,#8080800a_1px,transparent_1px)] bg-[size:30px_30px]"></div>
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500 rounded-full filter blur-[120px] opacity-20 animate-pulse"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-500 rounded-full filter blur-[120px] opacity-10 animate-pulse delay-1000"></div>

        <div class="max-w-4xl mx-auto text-center relative z-10">
            
            <span class="inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full text-sm font-medium bg-indigo-500/10 text-indigo-300 border border-indigo-500/20 mb-8 tracking-wider uppercase">
                <span class="w-2 h-2 rounded-full bg-indigo-400 animate-ping"></span>
                Performance Marketer Portfolio
            </span>

            <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold tracking-tight leading-[1.2] mb-6">
                <span class="block text-transparent bg-clip-text bg-gradient-to-r from-slate-200 via-indigo-200 to-slate-200">
                    콘텐츠를 빚고 데이터로 검증하는,
                </span>
                <span class="block mt-2 text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-emerald-400">
                    준비된 퍼포먼스 마케터
                </span>
            </h1>

            <p class="text-lg sm:text-xl text-slate-400 max-w-2xl mx-auto font-light leading-relaxed mb-12">
                디자인·SEO로 고객을 끌고, <strong class="text-emerald-400 font-semibold">GA로 성과를 증명</strong>하겠습니다.
            </p>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-3xl mx-auto mb-14">
                <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-4 transition-all hover:border-indigo-500/40 group">
                    <div class="text-indigo-400 text-2xl mb-2 group-hover:scale-110 transition-transform"><i class="fa-solid : fa-wand-magic-sparkles"></i></div>
                    <div class="text-sm font-semibold text-slate-200">Adobe Tool</div>
                    <div class="text-xs text-slate-500 mt-1">이미지·영상 편집</div>
                </div>
                <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-4 transition-all hover:border-indigo-500/40 group">
                    <div class="text-indigo-400 text-2xl mb-2 group-hover:scale-110 transition-transform"><i class="fa-solid : fa-layer-group"></i></div>
                    <div class="text-sm font-semibold text-slate-200">Web Design</div>
                    <div class="text-xs text-slate-500 mt-1">UI/UX 레이아웃</div>
                </div>
                <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-4 transition-all hover:border-indigo-500/40 group">
                    <div class="text-indigo-400 text-2xl mb-2 group-hover:scale-110 transition-transform"><i class="fa-solid : fa-magnifying-glass-chart"></i></div>
                    <div class="text-sm font-semibold text-slate-200">SEO 기초</div>
                    <div class="text-xs text-slate-500 mt-1">검색 엔진 최적화</div>
                </div>
                <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-4 transition-all hover:border-emerald-500/40 group">
                    <div class="text-emerald-400 text-2xl mb-2 group-hover:scale-110 transition-transform"><i class="fa-solid : fa-chart-line"></i></div>
                    <div class="text-sm font-semibold text-slate-200">GA / 데이터</div>
                    <div class="text-xs text-slate-500 mt-1">퍼포먼스 데이터 분석</div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <a href="#projects" class="px-8 py-4 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-medium tracking-wide shadow-lg shadow-indigo-600/30 transition-all hover:-translate-y-0.5 w-full sm:w-auto">
                    프로젝트 보기
                </a>
                <a href="#contact" class="px-8 py-4 rounded-xl bg-white/10 hover:bg-white/15 text-slate-200 font-medium tracking-wide border border-white/10 transition-all hover:-translate-y-0.5 w-full sm:w-auto">
                    Contact Me
                </a>
            </div>

        </div>

        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 text-slate-500 text-sm flex flex-col items-center gap-2 animate-bounce">
            <span class="text-xs tracking-widest uppercase">Scroll Down</span>
            <i class="fa-solid : fa-chevron-down"></i>
        </div>
    </section>

</body>
</html>
